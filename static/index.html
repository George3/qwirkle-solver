<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qwirkle Interactive Editor</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>Qwirkle Board</h1>
    <div id="status"></div>
  </header>

  <main>
    <section id="board-wrap">
      <svg id="board" xmlns="http://www.w3.org/2000/svg"></svg>
    </section>

    <section id="hand-wrap">
      <div class="hand-header">
        <select id="game-select" title="Switch game"></select>
        <button id="new-game-btn">New Game</button>
        <button id="rename-game-btn" title="Rename game">✎</button>
        <button id="delete-game-btn" title="Delete game">🗑</button>
        <h2>My Hand</h2>
      </div>
      <div id="move-controls">
        <label>Mode
          <select id="interaction-mode">
            <option value="record">Record move</option>
            <option value="setup">Edit setup</option>
          </select>
        </label>
        <button id="edit-players-btn">Players</button>
        <label>Current player
          <select id="active-player-select"></select>
        </label>
        <button id="commit-move-btn">Commit Move</button>
        <button id="cancel-move-btn">Clear Draft</button>
        <span id="move-summary"></span>
      </div>
      <svg id="hand" xmlns="http://www.w3.org/2000/svg"></svg>
    </section>
  </main>

  <div id="picker-overlay" class="hidden">
    <div id="picker">
      <div id="picker-title">Pick a tile</div>
      <div id="picker-grid"></div>
      <div id="picker-actions">
        <button id="picker-remove" class="hidden">Remove</button>
        <button id="picker-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
